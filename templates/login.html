<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyTogether — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Outfit:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-brand">
      <span class="brand-icon" style="font-size:2rem">✦</span>
      <h1 class="login-title">StudyTogether</h1>
      <p class="login-subtitle">Estude junto com sua parceira</p>
    </div>

    <div class="login-card">
      {% if error %}
      <div class="login-error">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/">
        <div class="login-field">
          <label>Usuário</label>
          <input type="text" name="username" placeholder="seu usuário" autocomplete="username" required autofocus>
        </div>
        <div class="login-field">
          <label>Senha</label>
          <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button type="submit" class="login-btn">Entrar</button>
      </form>
    </div>
  </div>
</body>
</html>
